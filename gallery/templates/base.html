<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSMS Tanzania</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-900 text-white p-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between">
            <a href="/" class="font-bold text-xl">SSMS Tanzania</a>
            <div>
                <a href="/gallery/" class="px-4">Gallery</a>
                {% if user.is_authenticated %}
                    <span class="opacity-70">| Habari, {{ user.username }}</span>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="min-h-screen">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-gray-800 text-white text-center p-6 mt-10">
        <p>&copy; 2026 Smart School Management System - Tanzania</p>
    </footer>
</body>
</html>
