{% extends 'base.html' %}
{% block content %}
<div class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-10">
        <h2 class="text-3xl font-extrabold text-blue-900 border-l-8 border-blue-600 pl-4">Gallery ya Shule</h2>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        {% for album in albums %}
        <div class="group relative bg-white rounded-2xl shadow-lg overflow-hidden hover:shadow-2xl transition duration-500">
            <div class="h-56 bg-gradient-to-br from-blue-100 to-blue-50 flex items-center justify-center">
                <svg class="w-16 h-16 text-blue-300 group-hover:scale-110 transition duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <div class="p-6">
                <h3 class="text-xl font-bold text-gray-800 mb-2">{{ album.title }}</h3>
                <p class="text-gray-600 text-sm mb-4 line-clamp-2">{{ album.description }}</p>
                <a href="{% url 'album_detail' album.id %}" class="inline-flex items-center text-blue-600 font-bold hover:text-blue-800">
                    Fungua Albamu 
                    <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
