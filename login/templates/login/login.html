<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SSMS Tanzania</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center">
    <div class="glass-effect p-8 rounded-2xl shadow-2xl w-full max-w-md text-white">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight">SSMS TANZANIA</h1>
            <p class="text-blue-100 text-sm">Smart School Management System</p>
        </div>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium mb-2">Username</label>
                <input type="text" name="username" class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400 text-white placeholder-white/50" placeholder="Ingiza jina lako">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" name="password" class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400 text-white placeholder-white/50" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300 shadow-lg">
                Ingia Kwenye Mfumo
            </button>
        </form>
        
        <div class="mt-6 text-center text-xs text-blue-200">
            &copy; 2026 Elixa Software Company. Ulinzi wa SSL Umewezeshwa.
        </div>
    </div>
</body>
</html>
